<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>家玉的鱼塘主页</title>
    <style>
        /* 升级版：更有质感的鱼 */
.fish {
    position: absolute;
    cursor: pointer;
    transition: transform 0.3s, filter 0.3s;
    z-index: 10;
    /* 初始状态：淡淡的透明度 */
    opacity: 0.8; 
}

/* 鱼的 SVG 图案（纯代码生成） */
.fish::before {
    content: '';
    display: block;
    width: 60px; /* 鱼的大小 */
    height: 40px;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60"><path d="M90,30 C90,45 70,55 50,55 C30,55 10,45 10,30 C10,15 30,5 50,5 C70,5 90,15 90,30 Z" fill="%2326c6da"/><path d="M10,30 L-5,40 L-5,20 Z" fill="%230097a7"/></svg>');
    background-size: contain;
    background-repeat: no-repeat;
    /* 增加投射阴影 */
    filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); 
}

/* 鼠标悬停时的效果：变亮、变大 */
.fish:hover {
    transform: scale(1.1);
    opacity: 1;
    filter: brightness(1.1) drop-shadow(0 8px 10px rgba(0,0,0,0.3));
}
        /* 1. 把之前的 linear-gradient 替换掉 */
body { 
    background-image: url("assets/img/water.jpg"); /* 这里换成你照片的名字 */
    background-size: cover;        /* 让图片铺满屏幕 */
    background-position: center;   /* 图片居中显示 */
    background-attachment: fixed;  /* 滚动时背景固定，更有深邃感 */
    background-repeat: no-repeat;
    background-color: #e0f7fa;     /* 备用色，防止图片加载慢时白屏 */
}
        /* 2. 让头像优雅地悬浮在正中间 */
        #profile-avatar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px; 
            height: 180px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1), 0 0 50px rgba(255,255,255,0.4);
            z-index: 5; /* 确保它在鱼下面，鱼会游过它 */
            overflow: hidden;
            object-fit: cover;
        }

        /* 3. 鱼的容器 */
        .fish { position: absolute; cursor: pointer; transition: transform 0.3s; z-index: 10; }
        
        /* 4. 磨砂玻璃弹窗 */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 500px; padding: 30px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100;
            border: 1px solid rgba(255,255,255,0.3);
        }
        #close-btn { margin-top: 20px; cursor: pointer; color: #00796b; font-weight: bold; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 90; }
    </style>
</head>
<body>

<img id="profile-avatar" src="assets/img/profile.jpg" alt="家玉的照片">

<div id="overlay"></div>
<div id="modal">
    <h2 id="modal-title">信息</h2>
    <div id="modal-content">内容加载中...</div>
    <div id="close-btn" onclick="closeModal()">[ 点击返回水池 ]</div>
</div>

<script>
/* 鼠标悬停时的图片特效：放大并变亮 */
.fish:hover img {
    transform: scale(1.1); /* 轻轻放大 */
    filter: brightness(1.1) drop-shadow(0 8px 10px rgba(0,0,0,0.3)); /* 变亮，加深阴影 */
}
    const fishData = [
        { title: '关于我', content: '嗨！我是家渝，欢迎来到我的专属鱼塘。' },
        { title: '教育背景', content: '我来自华南农业大学的农林经济管理，现在是大三。' },
        { title: '我的技能', content: '擅长策划、营销以及有趣的网页设计。' },
        { title: '项目经历', content: 'Tada App 推广项目、个人主页开发等。' },
        { title: '联系方式', content: '18998055663。' }
    ];

    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
       // 手术 B：让所有鱼都加载 fish1.png，并加上美化样式
fish.innerHTML = `
    <img src="assets/img/fish1.png" 
         style="width:70px; height:auto; display:block; margin:0 auto; 
                filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); 
                transition: filter 0.3s, transform 0.3s;">
    <div style="font-size: 14px; color:#004d40; font-weight:bold; text-align:center; margin-top:5px;">
        ${data.title}
    </div>
`;
        document.body.appendChild(fish);

        let posX = Math.random() * window.innerWidth;
        let posY = Math.random() * window.innerHeight;
        let velX = (Math.random() - 0.5) * 2.5;
        let velY = (Math.random() - 0.5) * 2.5;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 60) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 60) velY *= -1;
            fish.style.left = posX + 'px';
            fish.style.top = posY + 'px';
            fish.style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(move);
        }
        move();

        fish.onclick = () => {
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-content').innerText = data.content;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        };
    });

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
