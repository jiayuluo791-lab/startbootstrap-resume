<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝的个人鱼塘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "PingFang SC", sans-serif; }
        body { background-image: url("dist/assets/img/water.jpg"); background-size: cover; background-position: center; background-attachment: fixed; }
        
        #profile-avatar { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.4); box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); z-index: 5; object-fit: cover; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }

        .fish { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .fish img { width: 80px; height: auto; }
        .fish div { font-size: 14px; color: #00796b; font-weight: bold; margin-top: 5px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.15); backdrop-filter: blur(8px); z-index: 90; }

        /* 技能实验室 Tab 样式 */
        .skill-tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #e0f2f1; padding-bottom: 10px; }
        .tab-btn { cursor: pointer; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; color: #00796b; transition: all 0.3s; }
        .tab-btn.active { background: #00796b; color: #fff; }
        .skill-content { display: none; animation: fadeIn 0.4s; }
        .skill-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .skill-img-box { border-radius: 10px; overflow: hidden; border: 1px solid #eee; position: relative; }
        .skill-img-box img { width: 100%; height: auto; display: block; }
        .skill-label { background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; position: absolute; bottom: 0; width: 100%; text-align: center; padding: 2px 0; }

        #main-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 550px; max-height: 85vh; padding: 25px; border-radius: 25px; background: #fff; z-index: 150; box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow-y: auto; }
        .close-x { position: sticky; top: -10px; float: right; cursor: pointer; font-size: 26px; color: #999; z-index: 160; background: #fff; border-radius: 50%; width: 30px; height: 30px; text-align: center; }

        /* 工作经历滑动 */
        .work-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px 0; }
        .work-card { flex: 0 0 85%; scroll-snap-align: center; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .work-card img { width: 100%; }
        .work-card a { color: #00796b; font-size: 11px; text-decoration: none; font-weight: bold; }

        .shell-item { position: fixed; width: 75px; height: 75px; display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        .shell-item img { width: 100%; }
        .bubble-common { position: fixed; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, rgba(178,235,242,0.3)); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; color: #00796b; border: 1px solid #fff; }
    </style>
</head>
<body>

<img id="profile-avatar" src="dist/assets/img/profile.jpg">
<div id="overlay" onclick="closeAll()"></div>

<div id="main-modal">
    <div class="close-x" onclick="closeAll()">×</div>
    <div id="main-content"></div>
</div>

<script>
    // 基础数据
    const fishData = [
        { title: '基础信息', type: 'info' },
        { title: '工作经历', type: 'work' },
        { title: '工作技能', type: 'skill' },
        { title: '性格与爱好', type: 'special' }
    ];

    // 初始化鱼
    fishData.forEach((data, index) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);
        let posX = Math.random() * (window.innerWidth - 100), posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2, velY = (Math.random() - 0.5) * 2;
        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 80) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 80) velY *= -1;
            fish.style.left = posX + 'px'; fish.style.top = posY + 'px';
            fish.querySelector('img').style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(move);
        }
        move();
        fish.onclick = () => handleFishClick(data);
    });

    function handleFishClick(data) {
        document.getElementById('overlay').style.display = 'block';
        const content = document.getElementById('main-content');
        if (data.type === 'skill') {
            content.innerHTML = `
                <h2 style="color:#00796b; margin-top:0;">技能实验室 Skill Lab</h2>
                <div class="skill-tabs">
                    <div class="tab-btn active" onclick="switchTab(0)">🎬 视频剪辑</div>
                    <div class="tab-btn" onclick="switchTab(1)">🎨 设计/脚本</div>
                    <div class="tab-btn" onclick="switchTab(2)">📑 方案/SOP</div>
                </div>
                <div class="skill-content active" id="tab-0">
                    <div class="skill-grid">
                        <div class="skill-img-box"><img src="dist/assets/img/skill_v1.jpg"><div class="skill-label">TikTok 本土化</div></div>
                        <div class="skill-img-box"><img src="dist/assets/img/skill_v2.jpg"><div class="skill-label">B站 特效/安利</div></div>
                    </div>
                    <ul style="font-size:13px; color:#666; line-height:1.6;">
                        <li><b>抖音：</b>热点卡点型、情感共鸣类。</li>
                        <li><b>TikTok：</b>本土化自然型运营，熟悉海外受众心理。</li>
                        <li><b>B站：</b>高燃特效剪辑，单条最高 4.1w 播放。</li>
                    </ul>
                </div>
                <div class="skill-content" id="tab-1">
                    <div class="skill-grid">
                        <div class="skill-img-box"><img src="dist/assets/img/skill_d1.jpg"><div class="skill-label">宣传海报设计</div></div>
                        <div class="skill-img-box"><img src="dist/assets/img/skill_d2.jpg"><div class="skill-label">脚本/文案撰写</div></div>
                    </div>
                    <p style="font-size:13px; color:#666;">擅长 Figma, PS 视觉设计，曾开创“华样电台”系列海报；具备成熟的公众号排版与视频脚本撰写逻辑。</p>
                </div>
                <div class="skill-content" id="tab-2">
                    <div class="skill-img-box" style="margin-bottom:10px;"><img src="dist/assets/img/skill_s1.jpg"></div>
                    <ul style="font-size:13px; color:#666; line-height:1.8;">
                        <li><b>数据驱动：</b>发布时间调研、AB测试方案。</li>
                        <li><b>流程标准化：</b>KOL合作SOP、geelark使用手册。</li>
                        <li><b>落地能力：</b>将营销目标转化为可执行的标准化操作指南。</li>
                    </ul>
                </div>
            `;
        } else if (data.type === 'work') {
            content.innerHTML = `
                <h2 style="color:#00796b; margin-top:0;">工作经历</h2>
                <div class="work-gallery">
                    <div class="work-card"><img src="dist/assets/img/worke1.jpg"><div style="padding:10px; text-align:center;"><a href="https://www.tiktok.com/@_babyfood" target="_blank">TikTok食谱账号运营</a></div></div>
                    <div class="work-card"><img src="dist/assets/img/worke2.jpg"><div style="padding:10px; text-align:center;"><a href="https://xhslink.com/m/6RJ7BJGKedW" target="_blank">美的华凌空调小红书</a></div></div>
                    <div class="work-card"><img src="dist/assets/img/worke3.jpg"><div style="padding:10px; text-align:center;"><a href="https://xhslink.com/m/5dalT0qlOf5" target="_blank">小红书明星账号自媒体</a></div></div>
                </div>
            `;
        } else if (data.type === 'info') {
            content.innerHTML = `<h2 style="color:#00796b;">基础信息</h2><p>罗家渝 | 华南农大 2027届 | 中共预备党员</p><p>电话：18998055663</p>`;
        } else {
            startHobbyFlow(); return;
        }
        document.getElementById('main-modal').style.display = 'block';
    }

    function switchTab(index) {
        document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === index));
        document.querySelectorAll('.skill-content').forEach((content, i) => content.classList.toggle('active', i === index));
    }

    function startHobbyFlow() {
        // ... 原有的性格与爱好逻辑 (气泡 -> 贝壳)
        document.getElementById('overlay').style.display = 'block';
        const big = document.createElement('div');
        big.className = 'bubble-common';
        big.style.width = '160px'; big.style.height = '160px';
        big.style.left = 'calc(50% - 80px)'; big.style.top = 'calc(50% - 80px)';
        big.innerText = '性格与爱好';
        document.body.appendChild(big);
        big.onclick = (e) => {
            e.stopPropagation();
            big.remove();
            // 此处可接原有的 spawnHobbyBubbles() 逻辑
        }
    }

    function closeAll() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('main-modal').style.display = 'none';
        document.querySelectorAll('.bubble-common').forEach(b => b.remove());
    }
</script>
</body>
</html>
