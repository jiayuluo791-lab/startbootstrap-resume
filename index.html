<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝的个人鱼塘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        
        /* 1. 背景图 */
        body { 
            background-image: url("dist/assets/img/water.jpg");
            background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat;
            background-color: #e0f7fa; 
        }
        
        /* 2. 中心头像 */
        #profile-avatar {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
            z-index: 5; object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-15px); }
        }

        /* 3. 鱼 */
        .fish { position: absolute; cursor: pointer; z-index: 10; }
        .fish img { width: 80px; height: auto; display: block; margin: 0 auto; }
        .fish div { font-size: 14px; color: #00796b; font-weight: bold; text-align: center; margin-top: 5px; }

        /* 4. 遮罩层 */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.02); backdrop-filter: blur(8px); z-index: 90; 
        }

        /* 5. 泡泡弹窗 */
        #modal {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.3);
            width: 260px; height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.7) 0%, rgba(178, 235, 242, 0.4) 40%, rgba(0, 150, 136, 0.1) 100%);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: inset -5px -5px 15px rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            padding: 40px; box-sizing: border-box;
            text-align: center; z-index: 100;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer; overflow: hidden; opacity: 0;
        }

        /* 变身为大展示厅 */
        #modal.expanded {
            width: 90%; max-width: 850px;
            height: auto; min-height: 500px;
            border-radius: 30px; 
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            cursor: default;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        @keyframes bubblePop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .showBubble { animation: bubblePop 0.5s ease-out forwards; }

        /* 内容排版样式 */
        #modal-title { font-size: 22px; color: #00796b; margin-top: 50px; transition: 0.4s; }
        #modal.expanded #modal-title { margin-top: 0; font-size: 32px; border-bottom: 2px solid #e0f2f1; padding-bottom: 15px; margin-bottom: 20px; }
        
        #modal-content { font-size: 15px; color: #444; line-height: 1.6; }
        
        /* 内部格栅排版 */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .info-section { background: rgba(0,150,136,0.03); padding: 15px; border-radius: 12px; }
        .info-section h4 { margin: 0 0 8px 0; color: #00796b; font-size: 16px; display: flex; align-items: center; }
        .tag { display: inline-block; background: #e0f2f1; color: #00796b; padding: 2px 8px; border-radius: 4fr; font-size: 12px; margin: 2px; font-weight: bold; }

        #close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; color: #999; font-size: 24px; }
    </style>
</head>
<body>

<img id="profile-avatar" src="dist/assets/img/profile.jpg" alt="家渝的照片">

<div id="overlay" onclick="closeModal()"></div>
<div id="modal" onclick="expandBubble()">
    <div id="close-btn" onclick="closeModal(); event.stopPropagation()">×</div>
    <h2 id="modal-title">标题</h2>
    <div id="modal-content">点击查看详情</div>
</div>

<script>
    const fishData = [
        { 
            title: '基础信息', 
            details: `
                <div class="info-grid">
                    <div class="info-section">
                        <h4>👤 个人概况</h4>
                        <b>姓名：</b>罗家渝<br>
                        <b>专业：</b>华南农业大学 · 农林经济管理<br>
                        <b>政治面貌：</b>中共预备党员<br>
                        <b>时间线：</b>2023 - 2027 (本科)
                    </div>
                    <div class="info-section">
                        <h4>📍 联系方式</h4>
                        <b>籍贯：</b>广东东莞 / <b>现居：</b>广州天河<br>
                        <b>电话：</b>18998055663<br>
                        <b>邮箱：</b>2304362354@qq.com
                    </div>
                    <div class="info-section" style="grid-column: span 2;">
                        <h4>🏆 荣誉与语言</h4>
                        <div>
                            <span class="tag">CET-4</span> <span class="tag">CET-6</span>
                            <span class="tag">日常工作交流无障碍</span>
                        </div>
                        <div style="margin-top:8px;">
                            🏅 <b>曾连续两年获得校级奖学金</b>
                        </div>
                    </div>
                    <div class="info-section" style="grid-column: span 2;">
                        <h4>💻 专业技能</h4>
                        <b>数据处理：</b>计算机二级、精通 Excel 数据透视表等追踪分析<br>
                        <b>办公协作：</b>熟练掌握 Word、PPT 等全套 Office 软件<br>
                        <b>视觉创意：</b>Figma、PS、秀米、Canva (独立策划设计)<br>
                        <b>视频剪辑：</b>剪映 (独立完成短视频策划与制作)
                    </div>
                </div>
            `
        },
        { title: '实习简历', details: '实习经历内容准备中...' },
        { title: '项目经历', details: 'Tada App 推广及项目细节...' },
        { title: '我的自媒体', details: '作品链接与运营数据...' },
        { title: '性格与爱好', details: '生活点滴与个人兴趣...' }
    ];

    let currentFishDetails = "";

    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);

        let posX = Math.random() * (window.innerWidth - 100);
        let posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2;
        let velY = (Math.random() - 0.5) * 2;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 100) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 100) velY *= -1;
            fish.style.left = posX + 'px';
            fish.style.top = posY + 'px';
            const fishImg = fish.querySelector('img');
            if (fishImg) { fishImg.style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)'; }
            requestAnimationFrame(move);
        }
        move();

        fish.onclick = () => {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-content').innerHTML = "点击泡泡查看详情";
            currentFishDetails = data.details;
            modal.classList.remove('expanded');
            modal.style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            modal.style.animation = 'none';
            modal.offsetHeight;
            modal.style.animation = null; 
            modal.classList.add('showBubble');
        };
    });

    function expandBubble() {
        const modal = document.getElementById('modal');
        if (modal.classList.contains('expanded')) return;
        modal.classList.add('expanded');
        modal.classList.remove('showBubble');
        setTimeout(() => {
            document.getElementById('modal-content').innerHTML = currentFishDetails;
        }, 150);
    }

    function closeModal() {
        const modal = document.getElementById('modal');
        modal.style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        modal.classList.remove('expanded');
    }
</script>
</body>
</html>
