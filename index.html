<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝的个人鱼塘</title>
    <style>
        :root { --teal: #00796b; --light-teal: #e0f2f1; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { 
            background-image: url("dist/assets/img/water.jpg"); 
            background-size: cover; background-position: center; 
            background-attachment: fixed; background-color: #e0f7fa; 
        }
        
        /* 中心头像 */
        #profile-avatar { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 220px; height: 220px; border-radius: 50%; 
            border: 8px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); z-index: 5; 
            object-fit: cover; animation: float 4s ease-in-out infinite; 
        }
        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }

        /* 鱼群 */
        .fish { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: opacity 0.5s; }
        .fish img { width: 80px; height: auto; }
        .fish div { font-size: 14px; color: var(--teal); font-weight: bold; margin-top: 5px; }

        /* 遮罩与弹窗 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(8px); z-index: 90; }
        #main-modal, #image-viewer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 25px; background: #fff; z-index: 150; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        #main-modal { width: 90%; max-width: 500px; padding: 30px; max-height: 80vh; overflow-y: auto; }
        #image-viewer { width: 95%; max-width: 1000px; background: none; box-shadow: none; overflow: visible; }
        #image-viewer img { width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* 气泡通用样式 */
        .bubble-common { 
            position: fixed; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, #fff, rgba(178,235,242,0.4)); 
            backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; 
            cursor: pointer; z-index: 100; color: var(--teal); border: 1px solid #fff; 
            transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); 
            text-align: center; box-sizing: border-box; font-weight: bold; 
        }
        
        #guide-text { position: fixed; top: 35%; left: 50%; transform: translateX(-50%); color: white; font-size: 22px; z-index: 110; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.3); pointer-events: none; }

        /* 技能文件夹 */
        .folder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 10px 0; }
        .folder-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .folder-icon { width: 60px; height: 60px; background: #f5f5f5; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 5px; border: 1px solid #eee; transition: transform 0.2s; }
        .folder-item:hover .folder-icon { transform: scale(1.1); }

        /* 唱片机 */
        .record-player { display: flex; overflow-x: auto; gap: 20px; padding: 20px 0; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .record-player::-webkit-scrollbar { display: none; }
        .record-item { flex: 0 0 150px; scroll-snap-align: center; text-align: center; }
        .record-item img { width: 140px; height: 140px; border-radius: 50%; border: 10px solid #222; animation: spin 8s linear infinite; animation-play-state: paused; box-shadow: 0 5px 15px rgba(0,0,0,0.3); object-fit: cover; }
        .record-item:hover img { animation-play-state: running; }

        /* 贝壳与运动 */
        .shell-item { position: fixed; width: 70px; height: 70px; display: none; flex-direction: column; align-items: center; z-index: 100; cursor: pointer; }
        .shell-item img { width: 100%; }
        .shell-item span { font-size: 10px; background: rgba(255,255,255,0.8); padding: 2px 5px; border-radius: 5px; margin-top: -5px; color: var(--teal); font-weight: bold; }

        /* 工作经历滑动 */
        .work-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px 0; }
        .work-card { flex: 0 0 85%; scroll-snap-align: center; border-radius: 15px; overflow: hidden; border: 1px solid #eee; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .work-card img { width: 100%; cursor: pointer; display: block; }

        .close-x { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; color: #999; z-index: 170; width: 30px; height: 30px; text-align: center; line-height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<img id="profile-avatar" src="dist/assets/img/profile.jpg">
<div id="overlay" onclick="closeAll()"></div>

<div id="main-modal">
    <div class="close-x" onclick="closeModal()">×</div>
    <div id="modal-body"></div>
</div>

<div id="image-viewer">
    <div class="close-x" onclick="closeViewer()" style="top:-40px; right:0;">×</div>
    <img id="full-img" src="">
</div>

<script>
    const travelCities = ['南京', '北京', '沈阳', '云南', '重庆', '湖南', '广东', '广西', '马来西亚'];
    const charTags = ["爱笑", "ENTJ", "喜欢交朋友", "偶尔工作狂", "不管是什么先写下来", "说干就干", "好玩的事情都想参与", "想象力丰富", "有点脸盲", "社牛大师", "有个设计梦", "第一喜欢海边"];
    let isRotating = false, rotationAngle = 0;

    const fishData = [
        { title: '基础信息', type: 'info', content: `<h3 style="color:var(--teal);margin-top:0;">基础信息</h3><p><b>罗家渝</b> | 华南农大 农林经管<br>中共预备党员 | 连续两年校奖学金</p><p>📞 18998055663<br>📧 2304362354@qq.com</p><p>技能认证：CET-6、计算机二级、Figma、Excel 数据透视表</p>` },
        { title: '工作经历', type: 'work', content: `
            <h3 style="color:var(--teal);margin-top:0;">项目实战集锦</h3>
            <div class="work-gallery">
                <div class="work-card"><img src="dist/assets/img/worke1.jpg" onclick="viewImage('worke1.jpg')"><p style="font-size:12px;text-align:center;padding:5px;">TikTok食谱实战</p></div>
                <div class="work-card"><img src="dist/assets/img/worke2.jpg" onclick="viewImage('worke2.jpg')"><p style="font-size:12px;text-align:center;padding:5px;">华凌小红书运营</p></div>
                <div class="work-card"><img src="dist/assets/img/worke3.jpg" onclick="viewImage('worke3.jpg')"><p style="font-size:12px;text-align:center;padding:5px;">明星自媒体运营</p></div>
                <div class="work-card"><img src="dist/assets/img/worke4.jpg" onclick="viewImage('worke4.jpg')"><p style="font-size:12px;text-align:center;padding:5px;">创意文案脚本</p></div>
                <div class="work-card"><img src="dist/assets/img/worke5.jpg" onclick="viewImage('worke5.jpg')"><p style="font-size:12px;text-align:center;padding:5px;">项目总结复盘</p></div>
            </div>
            <p style="font-size:11px;color:#999;text-align:center;margin-top:10px;">(左右滑动切换 · 点击放大查看)</p>` 
        },
        { title: '工作技能', type: 'skill' },
        { title: '性格与爱好', type: 'special' }
    ];

    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);
        let posX = Math.random() * (window.innerWidth - 100), posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2, velY = (Math.random() - 0.5) * 2;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 80) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 80) velY *= -1;
            fish.style.left = posX + 'px'; fish.style.top = posY + 'px';
            fish.querySelector('img').style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(move);
        }
        move();
        fish.onclick = () => {
            if (data.type === 'skill') openSkillFolder();
            else if (data.type === 'special') startDeepDive();
            else showModal(data.content);
        };
    });

    function openSkillFolder() {
        const html = `<h3 style="color:var(--teal);margin-top:0;">工作技能详情</h3><div class="folder-grid">
            <div class="folder-item" onclick="viewImage('image_2387a3.jpg')"><div class="folder-icon">🎬</div><div style="font-size:12px;">视频剪辑</div></div>
            <div class="folder-item" onclick="viewImage('image_2387e2.jpg')"><div class="folder-icon">🎨</div><div style="font-size:12px;">创意设计</div></div>
            <div class="folder-item" onclick="viewImage('image_238805.jpg')"><div class="folder-icon">📑</div><div style="font-size:12px;">数据SOP</div></div>
        </div>`;
        showModal(html);
    }

    function startDeepDive() {
        document.getElementById('overlay').style.display = 'block';
        document.querySelectorAll('.fish').forEach(f => f.style.opacity = '0');
        const guide = document.createElement('div');
        guide.id = 'guide-text';
        guide.innerText = "你想了解我的什么呢？";
        document.body.appendChild(guide);
        const options = [{name:'性格', type:'char'}, {name:'爱好', type:'hobby'}];
        options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'bubble-common dive-opt';
            btn.style.width = '120px'; btn.style.height = '120px';
            btn.style.top = '50%';
            btn.style.left = i === 0 ? 'calc(50% - 140px)' : 'calc(50% + 20px)';
            btn.innerText = opt.name;
            document.body.appendChild(btn);
            btn.onclick = (e) => {
                e.stopPropagation();
                guide.remove();
                document.querySelectorAll('.dive-opt').forEach(el => el.remove());
                opt.type === 'char' ? showCharTags() : showHobbySub();
            };
        });
    }

    function showCharTags() {
        const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        charTags.forEach((text, i) => {
            const tag = document.createElement('div');
            tag.className = 'bubble-common char-tag-float';
            const size = text.length > 5 ? 105 : 90;
            tag.style.width = size + 'px'; tag.style.height = size + 'px';
            tag.style.fontSize = '12px'; tag.innerText = text;
            tag.style.background = ['#E0F7FA', '#B2EBF2', '#E1F5FE', '#B3E5FC'][i % 4];
            tag.style.left = (centerX - size/2) + 'px';
            tag.style.top = (centerY - size/2) + 'px';
            tag.style.opacity = '0';
            document.body.appendChild(tag);
            const baseAngle = (i / charTags.length) * Math.PI * 2;
            const randomOffset = (Math.random() - 0.5) * 0.2; 
            const finalAngle = baseAngle + randomOffset;
            const targetX = centerX + Math.cos(finalAngle) * radius - size / 2;
            const targetY = centerY + Math.sin(finalAngle) * radius - size / 2;
            setTimeout(() => {
                tag.style.opacity = '1';
                tag.style.left = targetX + 'px';
                tag.style.top = targetY + 'px';
            }, 50 + (i * 30));
        });
    }

    function showHobbySub() {
        const subs = [{name:'✈️ 旅游', id:'travel'}, {name:'🌊 运动', id:'sport'}, {name:'🎧 听歌', id:'music'}];
        subs.forEach((s, i) => {
            const b = document.createElement('div');
            b.className = 'bubble-common hobby-item';
            b.style.width = '100px'; b.style.height = '100px';
            const a = (i/3)*Math.PI*2;
            b.style.left = (window.innerWidth/2 - 50 + Math.cos(a)*180)+'px';
            b.style.top = (window.innerHeight/2 - 50 + Math.sin(a)*180)+'px';
            b.innerText = s.name;
            document.body.appendChild(b);
            b.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.hobby-item').forEach(el => el.remove());
                if(s.id === 'travel') startTravelShells();
                else if(s.id === 'sport') showSportOptions();
                else showMusicPlayer();
            };
        });
    }

    function showMusicPlayer() {
        const musicHtml = `
            <h3 style="color:var(--teal);margin-top:0;">我的单曲循环</h3>
            <div class="record-player">
                ${[1,2,3,4,5,6].map(i => `
                    <div class="record-item">
                        <img src="dist/assets/img/p${i}.jpg">
                        <p style="font-size:12px;margin-top:10px;font-weight:bold;color:var(--teal);">Track ${i}</p>
                    </div>
                `).join('')}
            </div>
            <p style="font-size:11px;color:#999;text-align:center;">(左右滑动切换 · 悬停旋转唱片)</p>
        `;
        showModal(musicHtml);
    }

    function startTravelShells() {
        isRotating = true;
        travelCities.forEach(city => {
            const s = document.createElement('div');
            s.className = 'shell-item';
            s.innerHTML = `<img src="dist/assets/img/旅游贝壳.png"><span>${city}</span>`;
            document.body.appendChild(s);
            s.style.display = 'flex';
        });
        updateShells();
    }

    function updateShells() {
        if(!isRotating) return;
        rotationAngle += 0.005;
        document.querySelectorAll('.shell-item').forEach((s, i) => {
            const a = rotationAngle + (i/travelCities.length)*Math.PI*2;
            s.style.left = (window.innerWidth/2 - 35 + Math.cos(a)*220)+'px';
            s.style.top = (window.innerHeight/2 - 35 + Math.sin(a)*220)+'px';
        });
        requestAnimationFrame(updateShells);
    }

    function showSportOptions() {
        const sports = ["🏊‍♂️ 游泳", "🎾 网球"];
        sports.forEach((s, i) => {
            const b = document.createElement('div');
            b.className = 'bubble-common sport-opt';
            b.style.width = '110px'; b.style.height = '110px';
            b.style.top = '50%';
            b.style.left = i === 0 ? 'calc(50% - 130px)' : 'calc(50% + 20px)';
            b.innerText = s;
            document.body.appendChild(b);
            b.onclick = () => {
                const img = s.includes("游泳") ? "游泳.png" : "网球.png";
                viewImage(img);
            };
        });
    }

    function showModal(html) {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('main-modal').style.display = 'block';
    }

    function viewImage(src) {
        document.getElementById('full-img').src = "dist/assets/img/" + src;
        document.getElementById('image-viewer').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() { document.getElementById('main-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function closeViewer() { document.getElementById('image-viewer').style.display = 'none'; if(document.getElementById('main-modal').style.display === 'none') document.getElementById('overlay').style.display = 'none'; }
    
    function closeAll() {
        closeModal(); closeViewer(); isRotating = false;
        document.querySelectorAll('.fish').forEach(f => f.style.opacity = '1');
        document.querySelectorAll('.dive-opt, .char-tag-float, .hobby-item, .sport-opt, .shell-item, #guide-text').forEach(el => el.remove());
    }
</script>
</body>
</html>
