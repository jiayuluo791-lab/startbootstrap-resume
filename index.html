<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝的个人鱼塘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "PingFang SC", sans-serif; }
        body { background-image: url("dist/assets/img/water.jpg"); background-size: cover; background-position: center; background-attachment: fixed; background-color: #e0f7fa; }
        
        #profile-avatar { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; border-radius: 50%; border: 8px solid rgba(255, 255, 255, 0.4); box-shadow: 0 0 40px rgba(255, 255, 255, 0.6); z-index: 5; object-fit: cover; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-15px); } }

        .fish { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .fish img { width: 80px; height: auto; }
        .fish div { font-size: 14px; color: #00796b; font-weight: bold; margin-top: 5px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); z-index: 90; }

        /* 技能文件夹样式 */
        .folder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 10px; }
        .folder-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s; }
        .folder-item:hover { transform: scale(1.05); }
        .folder-icon { width: 65px; height: 65px; background: #f0f0f0; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 8px; border: 1px solid #ddd; }
        .folder-text { font-size: 12px; color: #333; font-weight: 500; }

        /* 弹窗通用样式 */
        #main-modal, #image-viewer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 25px; background: #fff; z-index: 150; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        #main-modal { width: 90%; max-width: 450px; padding: 30px; }
        #image-viewer { width: 95%; max-width: 900px; max-height: 90vh; background: none; box-shadow: none; }
        #image-viewer img { width: 100%; height: auto; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .close-x { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 24px; color: #999; z-index: 160; width: 30px; height: 30px; text-align: center; line-height: 30px; background: rgba(255,255,255,0.8); border-radius: 50%; }

        /* 气泡与贝壳 */
        .bubble-common { position: fixed; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, rgba(178,235,242,0.3)); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; color: #00796b; border: 1px solid #fff; }
        .shell-item { position: fixed; width: 75px; height: 75px; display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        .shell-item img { width: 100%; }
    </style>
</head>
<body>

<img id="profile-avatar" src="dist/assets/img/profile.jpg">
<div id="overlay" onclick="closeAll()"></div>

<div id="main-modal">
    <div class="close-x" onclick="closeModal()">×</div>
    <h3 style="color:#00796b; margin: 0 0 20px 5px; letter-spacing: 1px;">工作技能文件夹</h3>
    <div class="folder-grid">
        <div class="folder-item" onclick="viewImage('skill_video.jpg')">
            <div class="folder-icon">🎬</div>
            <div class="folder-text">视频剪辑</div>
        </div>
        <div class="folder-item" onclick="viewImage('skill_design.jpg')">
            <div class="folder-icon">🎨</div>
            <div class="folder-text">创意设计</div>
        </div>
        <div class="folder-item" onclick="viewImage('skill_sop.jpg')">
            <div class="folder-icon">📑</div>
            <div class="folder-text">数据与SOP</div>
        </div>
    </div>
</div>

<div id="image-viewer">
    <div class="close-x" onclick="closeViewer()" style="top: -40px; right: 0; color: #fff;">×</div>
    <img id="full-img" src="">
</div>

<script>
    const fishData = [
        { title: '基础信息', type: 'info' },
        { title: '工作经历', type: 'work' },
        { title: '工作技能', type: 'skill' },
        { title: '性格与爱好', type: 'special' }
    ];

    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);
        let posX = Math.random() * (window.innerWidth - 100), posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2, velY = (Math.random() - 0.5) * 2;
        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 80) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 80) velY *= -1;
            fish.style.left = posX + 'px'; fish.style.top = posY + 'px';
            fish.querySelector('img').style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(move);
        }
        move();
        fish.onclick = () => {
            if(data.type === 'skill') {
                document.getElementById('overlay').style.display = 'block';
                document.getElementById('main-modal').style.display = 'block';
            } else if(data.type === 'special') {
                startHobbyFlow();
            } else {
                // 其他模块的简易展示逻辑
                alert(data.title + " 模块建设中...");
            }
        };
    });

    function viewImage(imgName) {
        document.getElementById('full-img').src = "dist/assets/img/" + imgName;
        document.getElementById('image-viewer').style.display = 'block';
    }

    function closeViewer() { document.getElementById('image-viewer').style.display = 'none'; }
    function closeModal() { document.getElementById('main-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    
    function closeAll() {
        closeModal();
        closeViewer();
        document.querySelectorAll('.bubble-common, .shell-item').forEach(b => b.remove());
    }

    // 复用之前的性格与爱好逻辑 (略)
    function startHobbyFlow() { document.getElementById('overlay').style.display = 'block'; /* ...同前... */ }
</script>
</body>
</html>
