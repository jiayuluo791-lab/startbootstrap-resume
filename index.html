<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家玉的专属鱼塘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 1. 背景：直接指向根目录下的 assets */
        body { 
            background-image: url("assets/img/water.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #e0f7fa; /* 淡淡的湖蓝色底色 */
        }
        
        /* 2. 中心头像：增加柔和呼吸感 */
        #profile-avatar {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6), 0 10px 40px rgba(0,0,0,0.1);
            z-index: 5;
            object-fit: cover;
            animation: float 4s ease-in-out infinite; /* 增加浮动动画 */
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-15px); }
        }

        /* 3. 鱼容器样式 */
        .fish { position: absolute; cursor: pointer; z-index: 10; }
        .fish img { 
            width: 80px; height: auto; display: block; margin: 0 auto;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); 
            transition: transform 0.3s; 
        }
        
        /* 4. 鱼下面的文字 */
        .fish div {
            font-size: 14px; color: #00796b; font-weight: bold; text-align: center;
            margin-top: 5px; text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        /* 弹窗遮罩层 */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.2); backdrop-filter: blur(3px); z-index: 90; }
        
        /* 弹窗暂时保留，等会儿我们再统一改造成蓝色泡泡 */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 400px; padding: 25px; border-radius: 25px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100;
            text-align: center; color: #004d40;
        }
        #close-btn { margin-top: 15px; cursor: pointer; font-weight: bold; color: #009688; }
    </style>
</head>
<body>

<img id="profile-avatar" src="assets/img/profile.jpg" alt="家玉的照片">

<div id="overlay"></div>
<div id="modal">
    <h2 id="modal-title">信息</h2>
    <div id="modal-content"></div>
    <div id="close-btn" onclick="closeModal()">[ 点击返回水池 ]</div>
</div>

<script>
    const fishData = [
        { title: '基础信息', content: '加载中...' },
        { title: '实习简历', content: '加载中...' },
        { title: '项目经历', content: '加载中...' },
        { title: '我的自媒体', content: '加载中...' },
        { title: '性格与爱好', content: '加载中...' }
    ];

    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        // 注意：这里的路径去掉了 dist/
        fish.innerHTML = `
            <img src="assets/img/fish1.png">
            <div>${data.title}</div>
        `;
        document.body.appendChild(fish);

        let posX = Math.random() * (window.innerWidth - 100);
        let posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2;
        let velY = (Math.random() - 0.5) * 2;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 100) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 100) velY *= -1;
            
            fish.style.left = posX + 'px';
            fish.style.top = posY + 'px';

            const fishImg = fish.querySelector('img');
            if (fishImg) {
                fishImg.style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            }
            requestAnimationFrame(move);
        }
        move();

        fish.onclick = () => {
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-content').innerText = data.content;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        };
    });

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
