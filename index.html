<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝的个人鱼塘</title>
    <style>
        :root { --teal: #00796b; --glow: rgba(178, 235, 242, 0.4); }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "PingFang SC", sans-serif; background-color: #000b14; }
        body { background-image: url("dist/assets/img/water.jpg"); background-size: cover; background-position: center; }
        
        .jellyfish { position: absolute; width: 150px; height: auto; z-index: 2; pointer-events: none; opacity: 0.6; animation: JellyMovement 45s linear infinite; }
        @keyframes JellyMovement { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(50px, 80px) rotate(5deg); } 100% { transform: translate(0, 0) rotate(0deg); } }

        #profile-avatar { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; border: 6px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 40px var(--glow); z-index: 5; object-fit: cover; }

        .fish { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .fish img { width: 110px; height: auto; }
        .fish div { font-size: 15px; color: var(--teal); font-weight: bold; margin-top: 5px; text-shadow: 0 0 6px #fff; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 90; }
        #main-modal, #image-viewer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 20px; background: #fff; z-index: 150; box-shadow: 0 15px 50px rgba(0,0,0,0.5); }
        #main-modal { width: 85%; max-width: 450px; padding: 25px; max-height: 75vh; overflow-y: auto; }
        #image-viewer { width: 95%; max-width: 1000px; background: none; box-shadow: none; }
        #image-viewer img { width: 100%; border-radius: 12px; }
        .close-x { position: absolute; top: 12px; right: 12px; cursor: pointer; font-size: 20px; color: #666; background: #eee; width: 30px; height: 30px; border-radius: 50%; text-align: center; line-height: 30px; z-index: 10; }

        .shell-option { position: fixed; width: 125px; height: 125px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; color: var(--teal); font-weight: bold; transform: translate(-50%, -50%) scale(0); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shell-option span { position: relative; z-index: 2; font-size: 16px; text-shadow: 0 0 5px #fff; }
        .shell-option img { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .shell-unfold { transform: translate(-50%, -50%) scale(1) !important; opacity: 1 !important; }

        .scroll-box { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px; scrollbar-width: none; }
        .scroll-box::-webkit-scrollbar { display: none; }
        .scroll-box img { width: 180px; border-radius: 10px; flex-shrink: 0; cursor: pointer; }

        /* 性格标签散落动画 */
        .char-tag-scatter {
            position: fixed; padding: 8px 18px; background: #e0f2f1; color: #00796b; border-radius: 20px;
            font-weight: bold; font-size: 14px; pointer-events: none; z-index: 200; border: 1px solid #b2dfdb;
            animation: scatterAnim 4s ease-out forwards;
        }
        @keyframes scatterAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.8) rotate(var(--tr)); }
        }
    </style>
</head>
<body>

<img class="jellyfish" src="dist/assets/img/watermom.png" style="top:15%; left:10%;">
<img id="profile-avatar" src="dist/assets/img/profile.jpg">

<div id="overlay" onclick="closeAll()"></div>
<div id="main-modal"><div class="close-x" onclick="closeAll()">×</div><div id="modal-body"></div></div>
<div id="image-viewer"><div class="close-x" onclick="closeAll()" style="top:-40px; right:0;">×</div><img id="full-img" src=""></div>

<script>
    const fishList = [
        { title: '基础信息', type: 'info', content: `<h3>基本信息</h3><p><b>罗家渝</b><br>华南农业大学 2023级<br>📞 18998055663</p>` },
        { title: '工作经历', type: 'work' },
        { title: '工作技能', type: 'skill' },
        { title: '性格与爱好', type: 'special' }
    ];

    fishList.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish main-fish-item';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);

        let px = Math.random() * (window.innerWidth - 120), py = Math.random() * (window.innerHeight - 120);
        let vx = (Math.random() - 0.5) * 1.5, vy = (Math.random() - 0.5) * 1.5;

        function move() {
            px += vx; py += vy;
            if(px < 0 || px > window.innerWidth-110) vx *= -1;
            if(py < 0 || py > window.innerHeight-110) vy *= -1;
            fish.style.left = px + 'px'; fish.style.top = py + 'px';
            fish.querySelector('img').style.transform = vx > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(move);
        }
        move();

        fish.onclick = (e) => {
            e.stopPropagation();
            if (data.type === 'work') openWork();
            else if (data.type === 'skill') openSkills();
            else if (data.type === 'special') startDeepDive();
            else showModal(data.content);
        };
    });

    function openWork() {
        const h = `<h3>项目实战</h3><div class="scroll-box">${[1,2,3,4,5].map(i => `<img src="dist/assets/img/worke${i}.jpg" onclick="viewImage('worke${i}.jpg')">`).join('')}</div>`;
        showModal(h);
    }

    function openSkills() {
        const h = `<h3>核心技能</h3><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;">
            <div onclick="viewImage('skill_video.jpg')"><div style="font-size:28px;background:#f5f5f5;border-radius:12px;padding:10px;">🎬</div><div>视频剪辑</div></div>
            <div onclick="viewImage('skill_design.jpg')"><div style="font-size:28px;background:#f5f5f5;border-radius:12px;padding:10px;">🎨</div><div>视觉设计</div></div>
            <div onclick="viewImage('skill_sop.jpg')"><div style="font-size:28px;background:#f5f5f5;border-radius:12px;padding:10px;">📊</div><div>数据SOP</div></div>
        </div>`;
        showModal(h);
    }

    function startDeepDive() {
        document.getElementById('overlay').style.display = 'block';
        document.querySelectorAll('.main-fish-item').forEach(f => f.style.display = 'none');
        
        const opts = [{n:'性格标签', t:'c'}, {n:'兴趣爱好', t:'h'}];
        opts.forEach((o, i) => {
            const b = document.createElement('div');
            b.className = 'shell-option dive-temp-btn';
            b.innerHTML = `<img src="dist/assets/img/旅游贝壳.png"><span>${o.n}</span>`;
            b.style.top = '50%'; b.style.left = i === 0 ? 'calc(50% - 130px)' : 'calc(50% + 30px)';
            document.body.appendChild(b);
            setTimeout(() => b.classList.add('shell-unfold'), 50);
            
            b.onclick = (e) => {
                e.stopPropagation();
                if(o.t === 'c') scatterTags(); 
                else {
                    document.querySelectorAll('.dive-temp-btn').forEach(el => el.remove());
                    showHobbySub();
                }
            };
        });
    }

    function scatterTags() {
        const tags = ['ENTJ', '行动派', '社牛大师', '拒绝拖延', '想象力丰富', '说干就干', '爱笑', '偶尔工作狂', '有个设计梦', '第一喜欢海边', '探索欲极强', '执行力Max'];
        tags.forEach((text, i) => {
            const el = document.createElement('div');
            el.className = 'char-tag-scatter';
            el.innerText = text;
            el.style.left = '50%'; el.style.top = '50%';
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 250 + 150;
            el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            el.style.setProperty('--tr', (Math.random() - 0.5) * 90 + 'deg');
            el.style.animationDelay = (i * 0.1) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        });
    }

    function showHobbySub() {
        const subs = [
            {n:'✈️ 旅游', c:'<h3>热爱旅行</h3><p>探索过许多城市，喜欢捕捉自然灵感，追求“原生感”表达。</p>'},
            {n:'🏊‍♂️ 游泳', c:'<h3>游泳</h3><p>在水中寻找平静与力量，保持充沛精力。</p>'},
            {n:'🎾 网球', c:'<h3>网球</h3><p>享受挥拍的汗水，是一个积极心态的行动派。</p>'},
            {n:'🎧 听歌', id:'m'}
        ];
        subs.forEach((s, i) => {
            const b = document.createElement('div');
            b.className = 'shell-option hobby-temp-btn';
            b.innerHTML = `<img src="dist/assets/img/旅游贝壳.png"><span style="font-size:13px">${s.n}</span>`;
            const angle = (i / subs.length) * Math.PI * 2;
            b.style.left = (window.innerWidth/2 + Math.cos(angle)*170) + 'px';
            b.style.top = (window.innerHeight/2 + Math.sin(angle)*170) + 'px';
            document.body.appendChild(b);
            setTimeout(() => b.classList.add('shell-unfold'), 50);
            b.onclick = (e) => {
                e.stopPropagation();
                if(s.id === 'm') showMusic(); else showModal(s.c);
            };
        });
    }

    function showMusic() {
        const h = `<h3>我的唱片</h3><div class="scroll-box">${[1,2,3,4,5,6].map(i => `<img src="dist/assets/img/p${i}.jpg" style="border-radius:50%;width:130px;height:130px;object-fit:cover;border:4px solid #333;">`).join('')}</div>`;
        showModal(h);
    }

    function showModal(h) { document.getElementById('modal-body').innerHTML = h; document.getElementById('main-modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function viewImage(s) { document.getElementById('full-img').src = "dist/assets/img/" + s; document.getElementById('image-viewer').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function closeAll() {
        document.getElementById('main-modal').style.display = 'none';
        document.getElementById('image-viewer').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.querySelectorAll('.main-fish-item').forEach(f => f.style.display = 'flex');
        document.querySelectorAll('.dive-temp-btn, .hobby-temp-btn, .char-tag-scatter').forEach(el => el.remove());
    }
</script>
</body>
</html>
