<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家渝有一片海</title>
    <style>
        :root { --teal: #00796b; --glow: rgba(178, 235, 242, 0.6); }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: "PingFang SC", sans-serif; background-color: #000b14; }
        body { background: linear-gradient(rgba(0, 11, 20, 0.35), rgba(0, 11, 20, 0.35)), url("dist/assets/img/water.jpg") no-repeat center center; background-size: cover; background-attachment: fixed; display: flex; justify-content: center; align-items: center; }
        #fireflyCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .jellyfish { position: absolute; width: 150px; height: auto; z-index: 2; pointer-events: none; opacity: 0.7; animation: JellyFloat 6s ease-in-out infinite; }
        @keyframes JellyFloat { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
        #profile-avatar { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; border-radius: 50%; border: 6px solid rgba(255, 255, 255, 0.3); box-shadow: 0 0 40px var(--glow); z-index: 5; object-fit: cover; animation: AvatarFloat 5s ease-in-out infinite; }
        @keyframes AvatarFloat { 0%, 100% { transform: translate(-50%, -50%) translateY(0px); } 50% { transform: translate(-50%, -50%) translateY(-12px); } }
        .fish { position: absolute; cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .fish img { width: 110px; height: auto; transition: transform 0.3s; }
        .fish div { font-size: 15px; color: var(--teal); font-weight: bold; margin-top: 5px; text-shadow: 0 0 6px #fff; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 90; }
        #main-modal, #image-viewer { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 25px; background: #fff; z-index: 150; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        #main-modal { width: 85%; max-width: 480px; padding: 25px; max-height: 75vh; overflow-y: auto; }
        .work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .work-grid img { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 1.5px solid #eee; transition: transform 0.2s; }
        .close-x { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 22px; color: #666; background: #eee; width: 32px; height: 32px; border-radius: 50%; text-align: center; line-height: 32px; z-index: 10; }
        .shell-option { position: fixed; width: 125px; height: 125px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; color: var(--teal); font-weight: bold; transform: translate(-50%, -50%) scale(0); opacity: 0; transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shell-option img { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .shell-unfold { transform: translate(-50%, -50%) scale(1) !important; opacity: 1 !important; }
        .char-tag-scatter { position: fixed; padding: 10px 20px; background: #e0f2f1; color: #00796b; border-radius: 20px; font-weight: bold; font-size: 14px; pointer-events: none; z-index: 200; border: 1.5px solid #b2dfdb; animation: scatterAnim 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes scatterAnim { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0); } 100% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--tr)); } }

        /* 贝壳与气泡特效样式 */
        .treasure-box { position: fixed; bottom: 50px; right: 50px; width: 140px; z-index: 99; cursor: pointer; animation: TreasureGlow 4s ease-in-out infinite; }
        @keyframes TreasureGlow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(178, 235, 242, 0.4)); transform: rotate(-10deg) scale(1); } 50% { filter: drop-shadow(0 0 30px rgba(212, 255, 128, 0.8)) brightness(1.2); transform: rotate(-10deg) scale(1.05); } }
        .shell-whisper { background: rgba(255, 255, 255, 0.95); color: #00796b; padding: 12px 24px; border-radius: 25px; font-weight: bold; font-size: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); pointer-events: none; transition: all 0.6s ease; white-space: nowrap; border: 1px solid rgba(178, 235, 242, 0.5); }
        .flower-icon { display: inline-block; margin-left: 5px; animation: FlowerSway 2s ease-in-out infinite; }
        @keyframes FlowerSway { 0%, 100% { transform: rotate(0); } 50% { transform: rotate(15deg) scale(1.2); } }
    </style>
</head>
<body>

<canvas id="fireflyCanvas"></canvas>
<img class="jellyfish" src="dist/assets/img/watermom.png" style="top:10%; left:5%;">
<img id="profile-avatar" src="dist/assets/img/profile.jpg">
<div id="overlay" onclick="closeAll()"></div>

<div id="main-modal"><div class="close-x" onclick="closeModal()">×</div><div id="modal-body"></div></div>
<div id="image-viewer"><div class="close-x" onclick="closeViewer()" style="top:-40px; right:0;">×</div><img id="full-img" src=""></div>

<div class="treasure-box" onclick="spawnLuck(event)">
    <img src="dist/assets/img/粉贝壳.png" style="width:100%;">
</div>

<script>
    const canvas = document.getElementById('fireflyCanvas');
    const ctx = canvas.getContext('2d');
    let fireflies = [];
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        fireflies = Array.from({length: 50}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            r: Math.random() * 2 + 1, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.3,
            a: Math.random(), ds: Math.random() * 0.01 + 0.005
        }));
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fireflies.forEach(f => {
            f.x += f.vx; f.y += f.vy; f.a += f.ds;
            if(f.a > 0.8 || f.a < 0.2) f.ds *= -1;
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(180, 255, 230, ${f.a})`;
            ctx.shadowBlur = 12; ctx.shadowColor = "#d4ff80";
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    initCanvas(); draw(); window.onresize = initCanvas;

    const fishData = [
        { title: '工作经历', content: '<h3>项目实战</h3><div class="work-grid"><img src="dist/assets/img/worke1.jpg" onclick="viewImage(\'worke1.jpg\')"><img src="dist/assets/img/worke2.jpg" onclick="viewImage(\'worke2.jpg\')"><img src="dist/assets/img/worke3.jpg" onclick="viewImage(\'worke3.jpg\')"><img src="dist/assets/img/worke4.jpg" onclick="viewImage(\'worke4.jpg\')"></div>' },
        { title: '工作技能', type: 'skill' },
        { title: '性格与爱好', type: 'special' },
        { title: '基础信息', content: '<div style="text-align: left; line-height: 1.8;"><h3 style="color: var(--teal); border-bottom: 2px solid #e0f2f1; padding-bottom: 5px; margin-top: 0;">个人名片</h3><p><b>姓名：</b>罗家渝</p><p><b>联系方式：</b><br>18998055663 (微信同号)<br>2304362354@qq.com</p><p><b>学校专业：</b><br>华南农业大学｜农林经济管理<br><small>(2023-2027)</small></p><h3 style="color: var(--teal); border-bottom: 2px solid #e0f2f1; padding-bottom: 5px; margin-top: 15px;">专业技能</h3><p><b>🌐 语言能力：</b><br>英语 CET-6，具备商务沟通与内容本地化能力。</p><p><b>📊 数据分析：</b><br>计算机二级，熟练运用 Excel 数据透视表。</p><p><b>🎨 内容工具：</b><br>熟练使用剪映、PS、Canva、Figma、秀米。</p></div>' }
    ];

    fishData.forEach((data) => {
        const fish = document.createElement('div'); 
        fish.className = 'fish main-fish-item';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);
        let px = Math.random() * (window.innerWidth - 120), py = Math.random() * (window.innerHeight - 120);
        let vx = (Math.random() - 0.5) * 1.5, vy = (Math.random() - 0.5) * 1.5;
        function moveFish() {
            px += vx; py += vy;
            if(px < 0 || px > window.innerWidth-110) vx *= -1;
            if(py < 0 || py > window.innerHeight-110) vy *= -1;
            fish.style.left = px+'px'; fish.style.top = py+'px';
            fish.querySelector('img').style.transform = vx > 0 ? 'scaleX(1)' : 'scaleX(-1)';
            requestAnimationFrame(moveFish);
        }
        moveFish();
        fish.onclick = () => {
            if (data.type === 'skill') openSkillFolder();
            else if (data.type === 'special') startDeepDive();
            else showModal(data.content);
        };
    });

    function spawnLuck(e) {
        e.stopPropagation();
        const textTip = document.createElement('div');
        textTip.className = 'shell-whisper';
        textTip.innerHTML = '想了解更多欢迎找我聊天～ <span class="flower-icon">🌸</span>';
        textTip.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY-60}px; transform:translateX(-50%); z-index:1000;`;
        document.body.appendChild(textTip);
        setTimeout(() => { textTip.style.opacity = '0'; setTimeout(() => textTip.remove(), 600); }, 2000);

        const items = ['✨', '💎', '🐚', '🌟', '💰', '🍬', '🌸'];
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.innerText = items[Math.floor(Math.random() * items.length)];
            el.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY}px; z-index:999; pointer-events:none; font-size:20px; transition:all 1s ease-out;`;
            document.body.appendChild(el);
            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 150;
            requestAnimationFrame(() => {
                el.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(360deg)`;
                el.style.opacity = '0';
            });
            setTimeout(() => el.remove(), 1000);
        }
    }

   function openSkillFolder() {
        showModal(`
            <h3 style="color: var(--teal); border-bottom: 2px solid #e0f2f1; padding-bottom: 5px; margin-top: 0;">核心技能</h3>
            
            <div style="text-align: left; line-height: 1.6; color: #444;">
                <p><b>🎬 视频剪辑与创意：</b><br>熟练使用剪映、PS，具备优秀的网感和脚本拆解能力，能够独立完成从选题到成片的全过程。</p>
                <p><b>🎨 视觉设计与交互：</b><br>熟练运用 Canva、Figma、秀米进行排版与美化，注重品牌调性与用户视觉体验的统一。</p>
                <p><b>📊 数据分析与SOP：</b><br>计算机二级水平，擅长使用 Excel 数据透视表进行复盘，并能将复杂流程标准化（SOP）。</p>
            </div>

            <h3 style="color: var(--teal); border-bottom: 2px solid #e0f2f1; padding-bottom: 5px; margin-top: 15px;">作品集预览</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;">
                <div onclick="viewImage('skill_video.jpg')" style="cursor:pointer; text-align:center; background:#f5fdfb; padding:10px; border-radius:12px;">
                    <div style="font-size:24px;">🎬</div>
                    <div style="font-size:12px; color:var(--teal);">视频集</div>
                </div>
                <div onclick="viewImage('skill_design.jpg')" style="cursor:pointer; text-align:center; background:#f5fdfb; padding:10px; border-radius:12px;">
                    <div style="font-size:24px;">🎨</div>
                    <div style="font-size:12px; color:var(--teal);">设计稿</div>
                </div>
                <div onclick="viewImage('skill_sop.jpg')" style="cursor:pointer; text-align:center; background:#f5fdfb; padding:10px; border-radius:12px;">
                    <div style="font-size:24px;">📊</div>
                    <div style="font-size:12px; color:var(--teal);">SOP文档</div>
                </div>
            </div>
            <p style="font-size:12px; color:#999; margin-top:10px; text-align:center;">（点击图标查看作品原图）</p>
        `);
    }

    function startDeepDive() {
        document.getElementById('overlay').style.display = 'block';
        document.querySelectorAll('.main-fish-item, .jellyfish').forEach(f => f.style.display = 'none'); 
        const opts = [{name:'性格标签', type:'char'}, {name:'兴趣爱好', type:'hobby'}];
        opts.forEach((opt, i) => {
            const btn = document.createElement('div'); 
            btn.className = 'shell-option dive-opt';
            btn.innerHTML = `<img src="dist/assets/img/旅游贝壳.png"><span>${opt.name}</span>`;
            btn.style.top = '50%'; btn.style.left = i === 0 ? 'calc(50% - 145px)' : 'calc(50% + 145px)'; 
            document.body.appendChild(btn); 
            setTimeout(() => btn.classList.add('shell-unfold'), 50);
            btn.onclick = (e) => { 
                e.stopPropagation(); 
                if(opt.type === 'char') scatterTags(); 
                else { document.querySelectorAll('.dive-opt').forEach(el => el.remove()); showHobbySub(); } 
            };
        });
    }

    function scatterTags() {
        const tags = ['ENTJ', '有点脸盲', '偶尔想当忧郁少女', '拒绝拖延', '想象力丰富', '执行力max', '开朗爱笑', '搞怪', 'idea多', '尝新派也是守旧派'];
        tags.forEach((text, i) => {
            const el = document.createElement('div'); el.className = 'char-tag-scatter'; el.innerText = text;
            el.style.left = '50%'; el.style.top = '50%';
            const angle = (i / tags.length) * Math.PI * 2; const dist = 210 + Math.random() * 60;
            el.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
            el.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
            el.style.setProperty('--tr', (Math.random() - 0.5) * 30 + 'deg');
            document.body.appendChild(el);
        });
    }

    function showHobbySub() {
        const hobbyList = [
            { name: '🎾 运动类', content: '<h3>保持活力</h3><p>喜欢通过网球和游泳保持活力，也锻炼了专注力和持久力，喜欢网球带来的挑战感，喜欢游泳缓解疲惫、在水中什么都不用想，往前游</p>' },
            { name: '🎨 文艺类', content: '<h3>记录生活</h3><p>喜欢用日记和手帐记录生活，把烦恼的事情写在纸上，脑子就不会过载，喜欢花花绿绿的手帐，让我的生活充满色彩，同时也提升自我管理和创意表达能力</p>' },
            { name: '🌍 社交类', content: '<h3>探索世界</h3><p>热衷结识新朋友和探索不同的地域文化，喜欢语言，对粤语、英语和西语文化十分感兴趣，梦想是去巴塞罗那晒太阳，听人的故事，也听城市的故事</p>' },
            { name: '🍰 生活类', content: '<h3>发现趣味</h3><p>喜欢追剧和探索美食，乐于尝试新剧情新口味，但是找到了喜欢的会一直喜欢直到厌倦，也乐于发现生活中的趣味点，自娱自乐很有一手</p>' }
        ];
        hobbyList.forEach((s, i) => {
            const b = document.createElement('div'); b.className = 'shell-option hobby-item';
            b.innerHTML = `<img src="dist/assets/img/旅游贝壳.png"><span>${s.name}</span>`;
            const angle = (i / hobbyList.length) * Math.PI * 2; const radius = 170;
            b.style.left = (window.innerWidth / 2 + Math.cos(angle) * radius) + 'px';
            b.style.top = (window.innerHeight / 2 + Math.sin(angle) * radius) + 'px';
            document.body.appendChild(b);
            setTimeout(() => b.classList.add('shell-unfold'), 50);
            b.onclick = (e) => { e.stopPropagation(); showModal(`<div style="line-height:1.6;color:#444;">${s.content}</div>`); };
        });
    }

    function showModal(h) { document.getElementById('overlay').style.display='block'; document.getElementById('modal-body').innerHTML=h; document.getElementById('main-modal').style.display='block'; }
    function closeModal() { document.getElementById('main-modal').style.display='none'; document.getElementById('overlay').style.display='none'; }
    function closeAll() { closeModal(); document.getElementById('overlay').style.display='none'; document.querySelectorAll('.main-fish-item, .jellyfish').forEach(f => f.style.display = 'flex'); document.querySelectorAll('.dive-opt, .hobby-item, .char-tag-scatter').forEach(el => el.remove()); }
    function viewImage(s) { document.getElementById('full-img').src="dist/assets/img/"+s; document.getElementById('image-viewer').style.display='block'; document.getElementById('overlay').style.display='block'; }
    function closeViewer() { document.getElementById('image-viewer').style.display='none'; if(document.getElementById('main-modal').style.display==='none') document.getElementById('overlay').style.display='none'; }
</script>
</body>
</html>
