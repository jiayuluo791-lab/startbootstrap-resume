<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家玉的专属鱼塘</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 1. 背景图 */
        body { 
            background-image: url("dist/assets/img/water.jpg");
            background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat;
            background-color: #e0f7fa; 
        }
        
        /* 2. 中心头像 */
        #profile-avatar {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
            z-index: 5; object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-15px); }
        }

        /* 3. 鱼 */
        .fish { position: absolute; cursor: pointer; z-index: 10; }
        .fish img { width: 80px; height: auto; display: block; margin: 0 auto; }
        .fish div { font-size: 14px; color: #00796b; font-weight: bold; text-align: center; margin-top: 5px; }

        /* 4. 遮罩层 */
        #overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.02); backdrop-filter: blur(5px); z-index: 90; 
        }

        /* =========================================
           ✨ 核心修改：CSS 纯手工打造“水感泡泡” ✨
           ========================================= */
        #modal {
            display: none;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.3);
            
            /* 正圆与尺寸 */
            width: 260px; height: 260px;
            border-radius: 50%;
            
            /* 关键：使用渐变色模拟水泡质感 */
            background: radial-gradient(circle at 30% 30%, 
                        rgba(255, 255, 255, 0.6) 0%, 
                        rgba(178, 235, 242, 0.4) 40%, 
                        rgba(0, 150, 136, 0.1) 100%);
            
            /* 模拟泡泡的高光和边缘 */
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: inset -5px -5px 15px rgba(255, 255, 255, 0.3), 
                        0 10px 30px rgba(0, 0, 0, 0.05);
            
            /* 增加磨砂玻璃感 */
            backdrop-filter: blur(4px);
            
            padding: 40px; box-sizing: border-box;
            text-align: center; z-index: 100;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer; overflow: hidden;
            opacity: 0;
        }

        /* 二级：全屏磨砂玻璃墙 */
        #modal.expanded {
            width: 85%; max-width: 900px;
            height: 80%; max-height: 600px;
            border-radius: 40px; 
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            /* 变大后变成极简白色磨砂 */
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: default;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        @keyframes bubblePop {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .showBubble { animation: bubblePop 0.5s ease-out forwards; }

        #modal-title { font-size: 22px; color: #00796b; margin-top: 50px; transition: 0.4s; }
        #modal-content { font-size: 15px; color: #444; line-height: 1.6; margin-top: 10px; }
        #close-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); cursor: pointer; color: #009688; font-weight: bold; }

        /* 放大后的样式调整 */
        #modal.expanded #modal-title { margin-top: 0; font-size: 32px; }
        #modal.expanded #modal-content { font-size: 18px; margin-top: 20px; }
        #modal.expanded #close-btn { bottom: 30px; }
    </style>
</head>
<body>

<img id="profile-avatar" src="dist/assets/img/profile.jpg" alt="家玉的照片">

<div id="overlay" onclick="closeModal()"></div>
<div id="modal" onclick="expandBubble()">
    <h2 id="modal-title">标题</h2>
    <div id="modal-content">点击泡泡查看详情</div>
    <div id="close-btn" onclick="closeModal(); event.stopPropagation()">[ 返回 ]</div>
</div>

<script>
    const fishData = [
        { title: '基础信息', details: '姓名：罗家玉\n联系方式：[待填写]\n这里可以放你的基本介绍。' },
        { title: '实习简历', details: '这里未来可以放入详细的简历文字和图片展示。' },
        { title: '项目经历', details: 'Tada App 推广项目及其他策划成果。' },
        { title: '我的自媒体', details: '账号数据、爆款案例等。' },
        { title: '性格与爱好', details: '生活点滴、猫狗照片、旅行日记。' }
    ];

    let currentFishDetails = "";

    fishData.forEach((data) => {
        const fish = document.createElement('div');
        fish.className = 'fish';
        fish.innerHTML = `<img src="dist/assets/img/fish1.png"><div>${data.title}</div>`;
        document.body.appendChild(fish);

        let posX = Math.random() * (window.innerWidth - 100);
        let posY = Math.random() * (window.innerHeight - 100);
        let velX = (Math.random() - 0.5) * 2;
        let velY = (Math.random() - 0.5) * 2;

        function move() {
            posX += velX; posY += velY;
            if (posX < 0 || posX > window.innerWidth - 100) velX *= -1;
            if (posY < 0 || posY > window.innerHeight - 100) velY *= -1;
            fish.style.left = posX + 'px';
            fish.style.top = posY + 'px';
            const fishImg = fish.querySelector('img');
            if (fishImg) { fishImg.style.transform = velX > 0 ? 'scaleX(1)' : 'scaleX(-1)'; }
            requestAnimationFrame(move);
        }
        move();

        fish.onclick = () => {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-content').innerText = "点击泡泡查看详情";
            currentFishDetails = data.details;
            
            modal.classList.remove('expanded');
            modal.style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            
            modal.style.animation = 'none';
            modal.offsetHeight;
            modal.style.animation = null; 
            modal.classList.add('showBubble');
        };
    });

    function expandBubble() {
        const modal = document.getElementById('modal');
        if (modal.classList.contains('expanded')) return;
        modal.classList.add('expanded');
        modal.classList.remove('showBubble');
        setTimeout(() => {
            // 将换行符转换为 HTML 的换行标签
            document.getElementById('modal-content').innerHTML = currentFishDetails.replace(/\n/g, '<br>');
        }, 200);
    }

    function closeModal() {
        const modal = document.getElementById('modal');
        modal.style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        modal.classList.remove('expanded');
        modal.classList.remove('showBubble');
    }
</script>
</body>
</html>
